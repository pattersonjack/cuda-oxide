[advisories]
version = 2

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "cuda-bindings"
expression = "LicenseRef-NVIDIA"
license-files = [{ path = "../../LICENSE-NVIDIA", hash = 0x3863c5ac }]

[[licenses.exceptions]]
allow = ["LicenseRef-NVIDIA"]
name = "cuda-bindings"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/pliron-org/pliron"]
